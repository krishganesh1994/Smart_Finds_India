<!DOCTYPE html>
<html>
  <head>
    <title>Smart Finds India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
      <style>
.logo{width:120px;height:120px;object-fit:contain;border-radius:50%;margin-bottom:10px}
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:white;padding:20px;text-align:center}
.container{padding:20px}
.search{width:100%;padding:12px;margin-bottom:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 8px #ccc}
.card img{width:100%;height:180px;object-fit:contain}
button{background:#ff9900;border:none;padding:12px;width:100%;cursor:pointer}
footer{padding:20px;text-align:center}
</style>
    </head>
    <body>
      <header>
        <img class="logo" src="7580d5f7-744b-4d70-8e78-1e976bc07aee.jpeg" alt="Smart Finds Logo">
        <h1>Smart Finds India</h1>
        <p>Useful gadgets & everyday finds</p>
      </header>
      <div class="container">
        <input class="search" placeholder="Search gadgets..." onkeyup="searchProduct(this.value)">
          <div class="products">
            <div class="card">
              <img src="Writing_pad.JPG">
                <h3>Portronics Writing Pad</h3>
                <p>Digital writing pad</p>
                <h3>₹179</h3>
                <a href="https://amzn.in/d/0a5AaFbE">
                  <button>Buy on Amazon</button>
                </a>
              </div>
              <div class="card">
                <img src="e2939efb-8e9b-48c6-bcc3-a56cf1210072.jpeg">
                  <h3>Buddha Idol</h3>
                  <p>Meditating Sitting Buddha Idol Statue</p>
                  <h3>₹371</h3>
                  <a href="https://amzn.in/d/02zWaS8i">
                    <button>Buy on Amazon</button>
                  </a>
                </div>
              </div>
            </div>
            <footer>
              <p>Affiliate Disclosure: We may earn commission from qualifying purchases.</p>
            </footer>
            <script>
function searchProduct(text){
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(text.toLowerCase()) ? "block" : "none";
});
}
</script>
          </body>
        </html>
